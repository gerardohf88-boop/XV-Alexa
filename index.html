<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --bg-dark: #0d0f12;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-light: #f5f5f7;
            --text-gold: #e5c158;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            text-align: center;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 20%, #1e232d 0%, #0d0f12 80%);
            min-height: 100vh;
        }

        /* Pantalla / Sobre de Apertura */
        #envelope-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b0c0e;
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease, visibility 1s ease;
        }

        #envelope-overlay.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
        }

        .envelope-card {
            background: linear-gradient(145deg, #181b20, #121418);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            max-width: 90%; width: 380px;
        }

        .btn-open {
            background: linear-gradient(135deg, #d4af37, #aa820a);
            color: #000; font-weight: 600; font-family: 'Cinzel', serif;
            border: none; padding: 14px 28px; border-radius: 30px; cursor: pointer;
            font-size: 1rem; letter-spacing: 1.5px; margin-top: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }

        /* Visor de Canva */
        .canva-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.3);
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Temporizador */
        .countdown-section {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 20px; padding: 25px 15px; margin: 25px 0;
        }

        .countdown-label {
            font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--text-gold);
            margin-bottom: 15px; letter-spacing: 2px;
        }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .timer-box { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 10px; padding: 12px 5px; }
        .timer-number { font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 700; color: #fff; }
        .timer-unit { font-size: 0.65rem; color: var(--text-gold); text-transform: uppercase; margin-top: 4px; }

        /* Botones */
        .actions-section { display: flex; flex-direction: column; gap: 15px; }
        .btn-link {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
            border: 1px solid var(--primary); color: #fff; text-decoration: none;
            padding: 15px; border-radius: 12px; font-family: 'Cinzel', serif; font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .btn-link:hover { background: var(--primary); color: #000; font-weight: 600; }
        .btn-link svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>

    <!-- Apertura Inicial -->
    <div id="envelope-overlay">
        <div class="envelope-card">
            <h2 style="font-family: 'Pinyon Script', cursive; font-size: 3rem; color: var(--text-gold);">Nuestra Invitación</h2>
            <p style="font-family: 'Cinzel', serif; font-size: 0.85rem; color: #ccc;">Te invitamos a celebrar con nosotros</p>
            <button class="btn-open" onclick="openInvitation()">Abrir Invitación</button>
        </div>
    </div>

    <div class="container">

        <!-- Opción A: Canva Incrustado directamente en la web -->
        <div class="canva-wrapper">
            <iframe loading="lazy" style="width: 100%; height: 500px; border: none;"
                src="https://www.canva.com/design/DAHQLLksNaY/XZkHY9RaqpE1uey8kzw3Eg/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
            </iframe>
        </div>

        <!-- Temporizador Solo Faltan -->
        <section class="countdown-section">
            <div class="countdown-label">Solo Faltan</div>
            <div class="timer-grid">
                <div class="timer-box"><div class="timer-number" id="days">00</div><div class="timer-unit">Días</div></div>
                <div class="timer-box"><div class="timer-number" id="hours">00</div><div class="timer-unit">Horas</div></div>
                <div class="timer-box"><div class="timer-number" id="minutes">00</div><div class="timer-unit">Minutos</div></div>
                <div class="timer-box"><div class="timer-number" id="seconds">00</div><div class="timer-unit">Segundos</div></div>
            </div>
        </section>

        <!-- Botones de Enlace -->
        <section class="actions-section">

            <!-- Enlace alternativo para abrir Canva directamente -->
            <a href="https://www.canva.com/design/DAHQLLksNaY/XZkHY9RaqpE1uey8kzw3Eg/edit" target="_blank" class="btn-link">
                <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                Abrir Diseño en Canva
            </a>

            <!-- Ubicación -->
            <a href="https://maps.google.com" target="_blank" class="btn-link">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                Ubicación del Evento
            </a>

            <!-- WhatsApp -->
            <a href="https://api.whatsapp.com/send?phone=5210000000000&text=Hola!%20Confirmo%20mi%20asistencia%20al%20evento" target="_blank" class="btn-link">
                <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981z"/></svg>
                Confirmar por WhatsApp
            </a>

            <!-- Google Calendar -->
            <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Evento+Especial&dates=20260919T170000/20260919T230000&details=Te+esperamos+para+celebrar+juntos.&location=Ubicacion+del+evento" target="_blank" class="btn-link">
                <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
                Agendar en Google Calendar
            </a>
        </section>
    </div>

    <script>
        function openInvitation() {
            document.getElementById('envelope-overlay').classList.add('hidden');
        }

        // Reloj configurado al 19 de Septiembre de 2026 a las 17:00 HRS
        const eventDate = new Date("September 19, 2026 17:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = eventDate - now;

            if (distance < 0) {
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
