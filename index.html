<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV Años - Alexa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #2b2b2b;
            --card-bg: #3a3a3a;
            --accent-color: #d4af37;
            --text-color: #ffffff;
            --text-muted: #cccccc;
            --envelope-bg: #1e1e1e;
            --neon-gold: #fff3a8;
        }

        body.locked { overflow: hidden; position: fixed; width: 100%; height: 100%; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* --- EFECTOS --- */
        #butterfly-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; overflow: hidden; }
        .golden-butterfly { position: absolute; pointer-events: none; z-index: 99; }
        
        .envelope-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #2c2c2c 0%, #111111 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s; }
        .envelope-overlay.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- SOBRE --- */
        .envelope-wrapper { position: relative; cursor: pointer; perspective: 1000px; }
        .envelope { width: 300px; height: 200px; background-color: var(--envelope-bg); border: 1px solid rgba(212,175,55,0.3); border-radius: 0 0 8px 8px; transform-style: preserve-3d; }
        .flap { position: absolute; top: 0; width: 0; height: 0; border-left: 150px solid transparent; border-right: 150px solid transparent; border-top: 100px solid var(--envelope-bg); transform-origin: top; transition: transform 0.6s; z-index: 3; }
        .envelope-wrapper.open .flap { transform: rotateX(180deg); }
        .letter { position: absolute; bottom: 10px; left: 15px; width: 270px; height: 170px; background: #2b2b2b; border: 2px solid var(--accent-color); transition: transform 0.8s; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .envelope-wrapper.open .letter { transform: translateY(-120px); }

        /* --- CONTENIDO --- */
        .container { max-width: 450px; width: 100%; padding: 20px; text-align: center; }
        .invitation-img { width: 100%; border-radius: 15px; border: 2px solid var(--accent-color); margin: 20px 0; }
        .countdown { display: flex; justify-content: center; gap: 15px; margin: 30px 0; background: var(--card-bg); padding: 15px; border-radius: 10px; }
        .countdown-item { display: flex; flex-direction: column; font-size: 0.8rem; color: var(--text-muted); }
        .countdown-item span { font-size: 1.6rem; font-weight: bold; color: var(--accent-color); }
        .btn { display: inline-block; background-color: var(--accent-color); color: #000; padding: 12px 25px; text-decoration: none; border-radius: 25px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body class="locked">

    <div id="butterfly-container"></div>

    <div class="envelope-overlay" id="envelopeOverlay">
        <p>Haz clic para abrir tu invitación</p>
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope">
                <div class="flap"></div>
                <div class="letter">
                    <h3 style="color:var(--accent-color)">Alexa</h3>
                    <p>XV Años</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>Alexa</h1>
        <p>¡Mis XV Años!</p>
        <img src="foto1.jpeg" alt="Foto" class="invitation-img">
        
        <div class="countdown">
            <div class="countdown-item"><span id="days">00</span>Días</div>
            <div class="countdown-item"><span id="hours">00</span>Horas</div>
            <div class="countdown-item"><span id="minutes">00</span>Min</div>
            <div class="countdown-item"><span id="seconds">00</span>Seg</div>
        </div>

        <a href="https://wa.me/525564855060" class="btn">Confirmar Asistencia</a>
    </div>

    <script>
        // Apertura del sobre
        document.getElementById('envelopeWrapper').addEventListener('click', function() {
            this.classList.add('open');
            setTimeout(() => {
                document.getElementById('envelopeOverlay').classList.add('fade-out');
                document.body.classList.remove('locked');
                setInterval(createButterfly, 2000);
            }, 800);
        });

        // Mariposas
        function createButterfly() {
            const b = document.createElement('div');
            b.className = 'golden-butterfly';
            b.innerHTML = '🦋';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.top = '100vh';
            b.style.fontSize = '20px';
            document.getElementById('butterfly-container').appendChild(b);
            b.animate([{transform: 'translateY(0)'}, {transform: 'translateY(-110vh)'}], {duration: 5000})
             .onfinish = () => b.remove();
        }

        // Cuenta regresiva
        const target = new Date("Sep 19, 2026 16:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
