<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años - Alexa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #aa7c11;
            --grey-dark: #1c1d1f;
            --grey-light: #2c2d30;
            --text-light: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--grey-dark);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Sello Sobre --- */
        .envelope-wrapper { position: relative; width: 380px; height: 280px; background-color: #252629; cursor: pointer; transition: 0.8s; border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-seal { position: absolute; top: 140px; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: var(--gold-primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; animation: pulse-seal 2s infinite; }
        
        /* CORONAS SVG PURAS */
        .svg-crown { width: 35px; height: 35px; color: #111; }
        .real-crown { width: 80px; height: 80px; color: var(--gold-primary); margin-bottom: 5px; animation: float-crown 3s infinite; }
        @keyframes float-crown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        .main-invitation-content { position: relative; width: 100%; max-width: 450px; background: #17181a; border: 3px double var(--gold-primary); padding: 35px 20px; text-align: center; display: none; opacity: 0; transition: all 1s; z-index: 20; margin: 20px 10px; }
        .main-invitation-content.visible { display: block; opacity: 1; }

        /* MARIPOSAS ANIMADAS */
        .card-butterfly { position: absolute; width: 30px; height: 30px; background: var(--gold-light); clip-path: polygon(50% 45%, 0% 0%, 15% 70%, 50% 60%, 85% 70%, 100% 0%); z-index: 25; animation: float-card-bf 4s infinite; }
        .cb-left { top: 25px; left: 15px; }
        .cb-right { top: 60px; right: 20px; }
        @keyframes float-card-bf { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .sparkle { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; animation: fall-fade 1.5s linear forwards; }
        @keyframes fall-fade { to { transform: translateY(50px); opacity: 0; } }

        /* COPA ANIMADA */
        .fa-wine-glass-alt { animation: tilt-shake 2s infinite ease-in-out; }
        @keyframes tilt-shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }

        /* ESTILOS GENERALES */
        .shine-text { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: var(--gold-primary); margin: 10px 0; }
        .btn-gold { background: var(--gold-primary); color: #111; padding: 10px 20px; text-decoration: none; border-radius: 4px; display: inline-block; margin-top: 10px; font-weight: bold; }
        .info-card { background: #2c2d30; padding: 15px; margin: 10px 0; border: 1px solid #444; }
    </style>
</head>
<body>

    <!-- REPRODUCTOR -->
    <audio id="bgMusic" loop><source src="die-with-a-smile.mp3" type="audio/mpeg"></audio>

    <!-- SOBRE -->
    <div class="envelope-wrapper" id="envelope">
        <div class="gold-seal">
            <svg class="svg-crown" viewBox="0 0 24 24" fill="currentColor"><path d="M2 16.5l3-9.5 4.5 5 2.5-7 2.5 7 4.5-5 3 9.5z"/></svg>
        </div>
    </div>

    <!-- INVITACIÓN -->
    <div class="main-invitation-content" id="mainContent">
        <div class="card-butterfly cb-left" id="bfLeft"></div>
        <div class="card-butterfly cb-right" id="bfRight"></div>

        <header>
            <svg class="real-crown" viewBox="0 0 24 24" fill="currentColor"><path d="M2 16.5l3-9.5 4.5 5 2.5-7 2.5 7 4.5-5 3 9.5z"/></svg>
            <h1 class="shine-text">Alexa</h1>
        </header>

        <div class="info-card">
            <h4>Pase Familiar</h4>
            <i class="fas fa-wine-glass-alt"></i>
            <p>Pases: 4 Personas</p>
        </div>
        
        <a href="https://wa.me/525564855060" class="btn-gold">Confirmar Asistencia</a>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const mainContent = document.getElementById('mainContent');

        envelope.addEventListener('click', () => {
            envelope.style.display = 'none';
            mainContent.classList.add('visible');
            startSparkles();
        });

        function startSparkles() {
            setInterval(() => {
                const bf = Math.random() > 0.5 ? document.getElementById('bfLeft') : document.getElementById('bfRight');
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = (bf.offsetLeft + 15) + 'px';
                s.style.top = (bf.offsetTop + 30) + 'px';
                mainContent.appendChild(s);
                setTimeout(() => s.remove(), 1500);
            }, 300);
        }
    </script>
</body>
</html>
