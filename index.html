<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #4a4a4a; color: #d4af37; text-align: center; font-family: 'Arial', sans-serif; overflow-x: hidden; }
        .container { width: 90%; max-width: 600px; margin: auto; padding: 20px; }
        
        /* Efecto de brillo y movimiento suave */
        .glow-box { 
            background: rgba(0,0,0,0.3); 
            border: 2px solid #d4af37; 
            padding: 20px; 
            border-radius: 15px; 
            margin: 20px 0;
            animation: float 3s ease-in-out infinite, shimmer 2s infinite alternate;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shimmer { from { box-shadow: 0 0 5px #d4af37; } to { box-shadow: 0 0 20px #d4af37; } }

        #countdown { font-size: 2em; font-weight: bold; color: #fff; text-shadow: 0 0 10px #d4af37; }
        .crown { width: 100px; animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="corona.png" alt="Corona" class="crown">
        <h1>Mis XV Años Alexa</h1>

        <div class="glow-box">
            <p>Faltan:</p>
            <div id="countdown"></div>
        </div>
    </div>

    <script>
        // Configuración del contador
        const targetDate = new Date("September 19, 2026 00:00:00").getTime();
        
        const timer = setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
            
            if (diff < 0) clearInterval(timer);
        }, 1000);
    </script>
</body>
</html>
