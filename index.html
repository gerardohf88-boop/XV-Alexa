<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XV Alexa - Invitación Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --metallic-black: #0f0f0f;
        }
        body { 
            margin: 0; padding: 0; background-color: #000; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; font-family: 'Montserrat', sans-serif; 
        }

        /* Sobre 3D Metálico */
        .envelope-container { perspective: 1000px; cursor: pointer; position: relative; }
        .envelope {
            width: 320px; height: 220px; 
            background: linear-gradient(145deg, #2c2c2c, #000);
            border: 2px solid var(--gold);
            position: relative; transition: transform 0.6s ease;
            border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .envelope::before {
            content: ''; position: absolute; top: 0; left: 0; border-style: solid;
            border-width: 110px 160px 0 160px; border-color: var(--gold) transparent transparent transparent;
        }
        .envelope.open { transform: translateY(-150%) rotateX(-10deg); }

        /* Invitación dentro del sobre */
        .card {
            position: absolute; top: 0; left: 0; width: 320px; height: 550px;
            background: linear-gradient(135deg, #1a1a1a, #000);
            color: #fff; text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border: 2px solid var(--gold);
            padding: 15px; box-sizing: border-box;
            transform: translateY(0); transition: transform 0.8s ease;
            z-index: -1;
        }
        .envelope.open + .card { transform: translateY(-100%); z-index: 1; }

        /* Contenido */
        .crown { width: 50px; margin-bottom: 5px; }
        .photo-container { display: flex; gap: 10px; margin-bottom: 10px; }
        .photo-frame { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: 'Alex Brush'; color: var(--gold); margin: 0; font-size: 2em; }
        .info { margin: 10px 0; font-size: 0.85em; line-height: 1.4; text-align: left; width: 100%; }
        
        /* Contador */
        #countdown { font-size: 1.1em; color: var(--gold); margin: 10px 0; font-weight: bold; }
        
        .btn {
            display: inline-block; padding: 10px 20px; background: var(--gold);
            color: #000; text-decoration: none; border-radius: 5px;
            font-weight: 600; font-size: 0.9em; margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Música -->
    <audio id="audio" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="envelope-container" onclick="openInvitation()">
        <div class="envelope" id="env"></div>
        <div class="card">
            <img src="corona.png" alt="Corona" class="crown">
            <div class="photo-container">
                <div class="photo-frame"><img src="foto1.jpeg" alt="Foto 1"></div>
                <div class="photo-frame"><img src="foto2.jpeg" alt="Foto 2"></div>
            </div>
            <h1>Alexa</h1>
            <p>Mis XV Años</p>
            <div class="info">
                <p><strong>⛪ Misa:</strong> 17:00 hrs - Parroquia Central</p>
                <p><strong>🥂 Recepción:</strong> 20:00 hrs - Salón El Paraíso</p>
                <p><strong>📅 Fecha:</strong> 19 de Septiembre 2026</p>
            </div>
            <div id="countdown"></div>
            <a href="https://wa.me/525564855060?text=Hola, confirmo mi asistencia a los XV años de Alexa." class="btn">Confirmar Asistencia</a>
        </div>
    </div>

    <script>
        function openInvitation() {
            document.getElementById('env').classList.add('open');
            document.getElementById('audio').play();
        }

        // Cuenta regresiva
        const eventDate = new Date("Sep 19, 2026 00:00:00").getTime();
        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = eventDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            
            document.getElementById("countdown").innerHTML = days + "d " + hours + "h " + minutes + "m ";
            
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "¡Es hoy!";
            }
        }, 1000);
    </script>
</body>
</html>
