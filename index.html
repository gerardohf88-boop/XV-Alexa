<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años - Alexa</title>
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #aa7c11;
            --grey-dark: #1c1d1f;
            --grey-light: #2c2d30;
            --text-light: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', 'Didot', 'Georgia', serif;
        }

        body {
            background-color: var(--grey-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* Sistema de Brillos de Fondo */
        .gold-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            z-index: 1;
        }

        /* CONTENEDOR INTERACTIVO DEL SOBRE */
        .envelope-wrapper {
            position: relative;
            width: 380px;
            height: 280px;
            background-color: #252629;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .envelope-wrapper:hover {
            transform: scale(1.02) rotateX(5deg);
        }

        /* Solapa Superior */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 190px solid transparent;
            border-right: 190px solid transparent;
            border-top: 140px solid #2e3033;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.4));
            transform-origin: top center;
            transition: transform 0.6s ease-in-out;
            z-index: 5;
        }

        /* Cuerpo del Sobre Inferior/Laterales */
        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 190px solid #2a2b2e;
            border-right: 190px solid #2a2b2e;
            border-bottom: 140px solid #2c2e30;
            z-index: 4;
            border-radius: 0 0 4px 4px;
        }

        /* Sello de Oro que parpadea/pulsa */
        .gold-seal {
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, var(--gold-light) 0%, var(--gold-primary) 70%, var(--gold-dark) 100%);
            border-radius: 50%;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 0 15px rgba(212, 175, 55, 0.4);
            transition: all 0.5s ease;
            animation: pulse-seal 2s infinite ease-in-out;
        }

        .gold-seal img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        @keyframes pulse-seal {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 0 10px rgba(212, 175, 55, 0.4); }
            50% { transform: translate(-50%, -50%) scale(1.06); box-shadow: 0 4px 15px rgba(0,0,0,0.4), 0 0 25px rgba(212, 175, 55, 0.8); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 0 10px rgba(212, 175, 55, 0.4); }
        }

        /* Tarjeta Interior Asomándose */
        .inner-card-preview {
            position: absolute;
            bottom: 10px;
            left: 20px;
            width: 340px;
            height: 240px;
            background-color: var(--grey-light);
            border: 2px solid var(--gold-primary);
            border-radius: 4px;
            z-index: 2;
            padding: 20px;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        /* Efecto de Corona de Alta Fidelidad */
        .real-crown {
            width: 75px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6));
            margin-bottom: 5px;
            animation: float-crown 3s infinite ease-in-out;
        }

        @keyframes float-crown {
            0% { transform: translateY(0); }
            50% { transform: translateY(-4px); filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.9)); }
            100% { transform: translateY(0); }
        }

        /* Textos de Neón Dorado */
        .neon-gold-text {
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px var(--gold-primary), 0 0 20px var(--gold-primary), 0 0 30px var(--gold-dark);
            margin: 5px 0;
            font-family: 'Great Vibes', 'Bickham Script Pro', cursive, serif;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--gold-primary);
            text-transform: uppercase;
        }

        /* ESTADO ABIERTO (ANIMACIÓN DEL SOBRE) */
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .gold-seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
        }

        .envelope-wrapper.open .inner-card-preview {
            transform: translateY(-160px) scale(1.05);
            z-index: 8;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* CONTENIDO PRINCIPAL DE LA INVITACIÓN (OCULTO AL INICIO) */
        .main-invitation-content {
            position: absolute;
            top: 40px;
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg, #222326 0%, #17181a 100%);
            border: 3px double var(--gold-primary);
            border-radius: 8px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            opacity: 0;
            transform: scale(0.8) translateY(50px);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: -1;
        }

        .main-invitation-content.visible {
            position: relative;
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
            z-index: 20;
        }

        /* Cabecera Principal */
        .shine-text {
            font-size: 3.5rem;
            background: linear-gradient(to right, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa7c11 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            font-family: 'Great Vibes', 'Bickham Script Pro', cursive, serif;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* Galería de Fotos del Cliente */
        .photo-gallery {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
        }

        .client-photo {
            width: 130px;
            height: 180px;
            object-fit: cover;
            border: 2px solid var(--gold-primary);
            border-radius: 4px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            transition: transform 0.4s ease;
        }

        .client-photo:hover {
            transform: scale(1.05) rotate(2deg);
            border-color: var(--gold-light);
        }

        /* Detalles del Evento */
        .details-box {
            border-top: 1px dashed rgba(212, 175, 55, 0.4);
            border-bottom: 1px dashed rgba(212, 175, 55, 0.4);
            padding: 20px 0;
            margin: 20px 0;
        }

        .date-highlight {
            font-size: 1.3rem;
            color: var(--gold-light);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* Sistema de Mariposas Voladoras */
        .butterfly {
            position: absolute;
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, var(--gold-light) 0%, var(--gold-primary) 100%);
            clip-path: polygon(50% 45%, 0% 0%, 15% 70%, 50% 60%, 85% 70%, 100% 0%);
            opacity: 0;
            pointer-events: none;
            z-index: 15;
        }

        @keyframes fly-away {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
            50% { transform: translate(var(--x1), var(--y1)) scale(1) rotate(45deg); opacity: 0.8; }
            100% { transform: translate(var(--x2), var(--y2)) scale(0.2) rotate(90deg); opacity: 0; }
        }
    </style>
    <!-- Importación de fuente elegante de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

    <div class="gold-particles"></div>

    <!-- VISTA 1: EL SOBRE VIRTUAL -->
    <div class="envelope-wrapper" id="envelope">
        <div class="envelope-flap"></div>
        <div class="gold-seal">
            <!-- La corona de alta resolución local en el sello -->
            <img src="corona.png" alt="Sello Corona Real">
        </div>
        <div class="inner-card-preview">
            <!-- La corona de alta resolución local adentro de la tarjeta -->
            <img src="corona.png" alt="Corona Real Dorada" class="real-crown">
            <p class="subtitle" style="font-size: 0.7rem; margin: 0;">MIS XV AÑOS</p>
            <h3 class="neon-gold-text">Alexa</h3>
            <p style="font-size: 0.7rem; color: rgba(255,255,255,0.6); margin-top: 3px;">¡Toca para abrir!</p>
        </div>
        <div class="envelope-body"></div>
    </div>

    <!-- VISTA 2: INVITACIÓN PRINCIPAL COMPLETA -->
    <div class="main-invitation-content" id="mainContent">
        <header>
            <!-- La corona de alta resolución en la cabecera principal -->
            <img src="corona.png" alt="Corona Real Principal" class="real-crown" style="width: 110px; margin-bottom: 5px;">
            <p class="subtitle">MIS QUINCE AÑOS</p>
            <h1 class="shine-text">Alexa</h1>
        </header>

        <!-- Sección de Fotografías Locales -->
        <div class="photo-gallery">
            <img src="foto1.jpeg" alt="Alexa Foto 1" class="client-photo">
            <img src="foto2.jpeg" alt="Alexa Foto 2" class="client-photo">
        </div>

        <section class="details-box">
            <p style="font-style: italic; margin-bottom: 15px; color: #ccc;">
                "Hay momentos en la vida que son inolvidables, pero compartirlos con quienes más amas los hace eternos."
            </p>
            <p class="date-highlight">SÁBADO, 19 DE SEPTIEMBRE DE 2026</p>
            <p style="color: var(--gold-primary); letter-spacing: 1px;">RECEPCIÓN EXCLUSIVA</p>
        </section>

        <footer>
            <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5);">Te esperamos con elegancia y alegría.</p>
        </footer>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const mainContent = document.getElementById('mainContent');

        envelope.addEventListener('click', () => {
            // 1. Activar animación tridimensional del sobre
            envelope.classList.add('open');
            
            // 2. Disparar ráfaga mágica de mariposas de oro desde el centro
            createButterflyBurst();

            // 3. Desvanecer el sobre y presentar la invitación majestuosa de Alexa
            setTimeout(() => {
                envelope.style.display = 'none';
                mainContent.classList.add('visible');
            }, 1200);
        });

        function createButterflyBurst() {
            const container = document.body;
            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.classList.add('butterfly');
                
                // Posicionar en el núcleo del sobre
                b.style.left = '50%';
                b.style.top = '50%';
                
                // Generar rumbos aleatorios dinámicos para las mariposas
                const x1 = (Math.random() - 0.5) * 300;
                const y1 = (Math.random() - 0.5) * 300 - 100;
                const x2 = (Math.random() - 0.5) * 600;
                const y2 = (Math.random() - 0.5) * 600 - 200;
                
                b.style.setProperty('--x1', `${x1}px`);
                b.style.setProperty('--y1', `${y1}px`);
                b.style.setProperty('--x2', `${x2}px`);
                b.style.setProperty('--y2', `${y2}px`);
                
                // Velocidades asíncronas para realismo
                b.style.animation = `fly-away ${1.5 + Math.random()}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`;
                
                container.appendChild(b);
                setTimeout(() => b.remove(), 2500);
            }
        }
    </script>
</body>
</html>
