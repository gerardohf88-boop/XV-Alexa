<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - Mis XV Años</title>
    <style>
        :root { --gold: #d4af37; --envelope-color: #d1d1d1; --dark: #1c1d1f; }
        body { 
            background: var(--dark); color: white; font-family: 'Montserrat', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden; 
        }

        /* --- Sobre 3D --- */
        .envelope-container { perspective: 1000px; cursor: pointer; z-index: 100; }
        .envelope { width: 300px; height: 200px; background: var(--envelope-color); position: relative; border-radius: 0 0 10px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .envelope::before { /* Solapa */
            content: "INVITACIÓN"; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #555;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #b8b8b8; clip-path: polygon(0 0, 100% 0, 50% 70%);
            transform-origin: top; transition: transform 0.8s ease-in-out; z-index: 2;
        }
        .open .envelope::before { transform: rotateX(-180deg); }
        
        /* --- Tarjeta --- */
        .card { 
            width: 90%; max-width: 400px; background: rgba(34, 34, 34, 0.95); 
            border: 2px solid var(--gold); padding: 30px; border-radius: 20px; 
            display: none; opacity: 0; text-align: center; position: absolute; z-index: 50;
        }

        /* --- Efecto Glitter --- */
        .glitter { position: absolute; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; pointer-events: none; }

        .btn { display: block; background: var(--gold); color: black; padding: 12px; text-decoration: none; font-weight: bold; margin: 15px 0; border-radius: 8px; }
        .photo-frame { width: 100%; border-radius: 10px; border: 2px solid var(--gold); margin: 10px 0; }
    </style>
</head>
<body>

<div id="particle-container" style="position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 200;"></div>

<div class="envelope-container" id="env-box" onclick="abrir()">
    <div class="envelope"></div>
</div>

<div class="card" id="card">
    <div style="font-size: 2rem; color: var(--gold); font-weight: 800; text-transform: uppercase;">Mis XV Años<br>Alexa</div>
    <img src="foto1.jpeg" class="photo-frame" alt="Alexa">
    <p>¡Te espero para celebrar este día tan especial!</p>
    <a href="https://wa.me/525564855060" class="btn">Confirmar Asistencia</a>
</div>

<audio id="musica" src="die-with-a-smile.mp3"></audio>

<script>
    function abrir() {
        const box = document.getElementById('env-box');
        const container = document.getElementById('particle-container');
        box.classList.add('open');
        document.getElementById('musica').play();

        // Explosión de Glitter
        for (let i = 0; i < 150; i++) {
            let g = document.createElement('div');
            g.className = 'glitter';
            g.style.left = '50%'; g.style.top = '50%';
            container.appendChild(g);
            
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.random() * 400 + 100;
            g.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
            ], { duration: 1500, easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)' });
        }

        // Mostrar tarjeta
        setTimeout(() => {
            box.style.display = 'none';
            const card = document.getElementById('card');
            card.style.display = 'block';
            card.animate([{ opacity: 0, transform: 'scale(0.5)' }, { opacity: 1, transform: 'scale(1)' }], { duration: 1000, fill: 'forwards' });
        }, 600);
    }
</script>
</body>
</html>
