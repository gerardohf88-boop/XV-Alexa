<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años - Alexa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --grey-dark: #1c1d1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--grey-dark); 
            color: #f5f5f5; 
            font-family: 'Montserrat', sans-serif; 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; perspective: 1000px;
        }

        /* --- SISTEMA DE BRILLOS Y MARIPOSAS --- */
        #sparkle-container, #butterfly-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99;
        }

        .sparkle {
            position: absolute; width: 4px; height: 4px; background: white; border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .butterfly {
            position: absolute; width: 25px; height: 25px;
            background: radial-gradient(circle, var(--gold-light) 0%, var(--gold-primary) 100%);
            clip-path: polygon(50% 45%, 0% 0%, 15% 70%, 50% 60%, 85% 70%, 100% 0%);
            box-shadow: 0 0 15px var(--gold-primary);
            transition: transform 5s linear;
        }

        /* --- COMPONENTES INTERACTIVOS --- */
        .clink-animation { animation: clink 2s infinite ease-in-out; display: inline-block; }
        @keyframes clink {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }

        .envelope-wrapper { /* ... Mismo estilo del sobre previo ... */
            position: relative; width: 380px; height: 280px; background-color: #252629;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7); cursor: pointer; transition: 0.8s;
        }

        .main-invitation-content {
            display: none; width: 100%; max-width: 450px; background: #222326;
            border: 3px double var(--gold-primary); padding: 35px 20px; text-align: center;
        }

        .main-invitation-content.visible { display: block; }

        .btn-map {
            transition: all 0.3s ease;
            border: 1px solid var(--gold-primary);
            background: rgba(212, 175, 55, 0.1);
        }
        .btn-map:hover {
            transform: scale(1.05);
            background: var(--gold-primary);
            color: black;
            box-shadow: 0 0 20px var(--gold-primary);
        }

        .neon-gold-text { font-family: 'Great Vibes', cursive; color: #fff; text-shadow: 0 0 10px var(--gold-primary); }
    </style>
</head>
<body>

    <div id="sparkle-container"></div>
    <div id="butterfly-container"></div>

    <!-- YouTube Player -->
    <div id="player" style="display:none;"></div>

    <!-- Sobre -->
    <div class="envelope-wrapper" id="envelope">
        <div style="text-align: center; padding-top: 50px;">
            <img src="corona.png" style="width: 80px;">
            <h3>Alexa</h3>
            <p>Toca para abrir</p>
        </div>
    </div>

    <!-- Contenido Principal -->
    <div class="main-invitation-content" id="mainContent">
        <img src="corona.png" style="width: 80px;">
        <h1 class="neon-gold-text" style="font-size: 3rem;">Alexa</h1>
        
        <div style="display: flex; justify-content: center; gap: 10px;">
            <img src="foto1.jpeg" style="width: 150px; height: 200px; object-fit: cover;">
            <img src="foto2.jpeg" style="width: 150px; height: 200px; object-fit: cover;">
        </div>

        <div class="info-card">
            <h4>Ceremonia Religiosa (4:00 PM)</h4>
            <a href="https://maps.google.com" class="btn-map">Ver Ubicación Iglesia</a>
        </div>

        <div class="info-card">
            <h4>Recepción (5:30 PM)</h4>
            <a href="https://maps.google.com" class="btn-map">Ver Ubicación Salón</a>
        </div>

        <div class="info-card">
            <i class="fas fa-wine-glass-alt clink-animation"></i>
            <h4>Pases: 4 Personas</h4>
        </div>

        <a href="https://wa.me/525564855060?text=Confirmo%20asistencia%20XV%20Alexa" class="btn-map" style="padding: 15px; display: block; margin-top: 20px;">
            Confirmar por WhatsApp
        </a>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- LÓGICA DE EFECTOS ---
        
        // Destellos (Sparkles)
        const sContainer = document.getElementById('sparkle-container');
        setInterval(() => {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            sContainer.appendChild(s);
            setTimeout(() => s.remove(), 2000);
        }, 300);

        // Mariposas persistentes (Sistema de vuelo)
        const bContainer = document.getElementById('butterfly-container');
        function spawnButterfly() {
            const b = document.createElement('div');
            b.className = 'butterfly';
            b.style.left = '-50px';
            b.style.top = Math.random() * 100 + '%';
            bContainer.appendChild(b);
            
            const duration = 5000 + Math.random() * 5000;
            b.animate([
                { transform: 'translate(0, 0) rotate(0deg)' },
                { transform: `translate(100vw, ${(Math.random()-0.5)*200}px) rotate(360deg)` }
            ], { duration: duration, easing: 'linear' });
            
            setTimeout(() => b.remove(), duration);
        }
        setInterval(spawnButterfly, 2000);

        // --- LÓGICA DE APERTURA ---
        let player;
        document.getElementById('envelope').addEventListener('click', () => {
            document.getElementById('envelope').style.display = 'none';
            document.getElementById('mainContent').classList.add('visible');
            if(player) player.playVideo();
        });

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'kPa7bsKwL-c',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'kPa7bsKwL-c' }
            });
        }
    </script>
</body>
</html>
