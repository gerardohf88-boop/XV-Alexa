<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años - Alexa</title>
    <style>
        :root { --gold: #d4af37; --grey-metal: #a8a9ad; --dark: #1c1d1f; }
        body { background: var(--dark); color: white; font-family: 'Montserrat', sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        
        /* Efectos visuales */
        #fx-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .float-obj { position: absolute; animation: drift linear infinite; font-size: 20px; z-index: 1; }
        @keyframes drift { 0% { transform: translateY(100vh); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }

        /* Sobre */
        .envelope-container { perspective: 1000px; cursor: pointer; z-index: 100; position: relative; width: 300px; height: 200px; }
        .envelope { width: 100%; height: 100%; background: #d1d1d1; position: relative; border-radius: 0 0 10px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .envelope::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #b8b8b8; clip-path: polygon(0 0, 100% 0, 50% 70%); transform-origin: top; transition: transform 0.8s ease-in-out; z-index: 2; }
        .open .envelope::before { transform: rotateX(-180deg); }
        .crown-icon { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 80px; z-index: 3; pointer-events: none; }
        .inv-text { position: absolute; top: 120px; width: 100%; text-align: center; color: #555; font-weight: bold; letter-spacing: 2px; z-index: 3; text-transform: uppercase; }

        /* Tarjeta */
        .card { width: 90%; max-width: 400px; background: rgba(34, 34, 34, 0.95); border: 2px solid var(--gold); padding: 30px; border-radius: 20px; display: none; opacity: 0; text-align: center; z-index: 10; margin: 20px auto; transition: opacity 1s ease; }
        .title-gold { font-size: 2.2rem; font-weight: 800; text-transform: uppercase; background: linear-gradient(to bottom, #d4af37, #f7ef8a, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.2px var(--grey-metal); line-height: 1.1; }
        .btn { display: block; background: var(--gold); color: black; padding: 12px; text-decoration: none; font-weight: bold; margin: 15px 0; border-radius: 8px; }
        .btn-wa { background: #25d366; color: white; }
        .photo-frame { width: 100%; border-radius: 10px; border: 2px solid var(--gold); margin: 10px 0; }
        .icon-img { width: 80px; height: 80px; margin: 10px auto; display: block; }
    </style>
</head>
<body>

<div id="fx-container"></div>

<div class="envelope-container" id="env-box" onclick="abrir()">
    <img src="corona.png" class="crown-icon" alt="Corona">
    <div class="envelope"></div>
    <div class="inv-text">Invitación</div>
</div>

<div class="card" id="card">
    <div class="title-gold">Mis XV Años<br>Alexa</div>
    <img src="corona.png" alt="Corona" style="width: 80px; margin: 10px 0;">
    <img src="foto1.jpeg" class="photo-frame" alt="Alexa">
    
    <p style="font-style: italic;">¡Te invito a celebrar conmigo este día tan especial!</p>
    
    <p style="font-weight: bold; color: var(--gold);">Faltan:</p>
    <div id="timer" style="display: flex; justify-content: space-between; margin: 15px 0;"></div>

    <p><b>Mis Padres:</b><br>Patricia Valtierra y Jesús Neyra</p>
    <p><b>Mi Madrina:</b><br>Adriana Valtierra</p>
    <hr style="border-top: 1px solid var(--gold);">
    
    <img src="foto2.jpeg" class="photo-frame" alt="Alexa">

    <h3>Ceremonia Religiosa</h3>
    <img src="iglesia.png" class="icon-img" alt="Iglesia">
    <a href="https://maps.app.goo.gl/ii3c1FefPviK5Yat6" class="btn">Ver ubicación (4:00 PM)</a>

    <h3>Recepción</h3>
    <img src="recepcion.png" class="icon-img" alt="Recepción">
    <a href="https://maps.app.goo.gl/UWWrzNTeyeGzYMX76" class="btn">Ver ubicación (5:30 PM)</a>

    <a href="https://wa.me/525564855060" class="btn btn-wa">Confirmar Asistencia</a>
</div>

<audio id="musica" src="die-with-a-smile.mp3"></audio>

<script>
    function crearEfecto() {
        setInterval(() => {
            const container = document.getElementById('fx-container');
            let obj = document.createElement('div');
            obj.className = 'float-obj';
            obj.innerHTML = Math.random() > 0.5 ? '🦋' : '✨';
            obj.style.left = Math.random() * 100 + 'vw';
            obj.style.animationDuration = (Math.random() * 5 + 5) + 's';
            container.appendChild(obj);
            setTimeout(() => obj.remove(), 10000);
        }, 800);
    }

    function abrir() {
        const box = document.getElementById('env-box');
        box.classList.add('open');
        document.getElementById('musica').play();
        crearEfecto(); 

        setTimeout(() => {
            box.style.display = 'none';
            const card = document.getElementById('card');
            card.style.display = 'block';
            setTimeout(() => { card.style.opacity = "1"; }, 50);
        }, 800);
    }

    setInterval(() => {
        let diff = new Date('2026-09-19T16:00:00') - new Date();
        let d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById('timer').innerHTML = `<div style="background:#333; padding:5px; width:22%; border-radius:5px;">${d}<br><small>Días</small></div><div style="background:#333; padding:5px; width:22%; border-radius:5px;">${h}<br><small>Hrs</small></div><div style="background:#333; padding:5px; width:22%; border-radius:5px;">${m}<br><small>Min</small></div><div style="background:#333; padding:5px; width:22%; border-radius:5px;">${s}<br><small>Seg</small></div>`;
    }, 1000);
</script>
</body>
</html>
