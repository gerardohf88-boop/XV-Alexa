<!-- Reemplaza la sección del sobre en tu código por esta parte: -->

<div class="envelope" id="env" onclick="abrir()">
    <!-- Aquí se coloca tu imagen de corona -->
    <img src="corona.png" alt="Corona" style="width: 120px; height: auto; pointer-events: none;">
</div>

<style>
    /* Aseguramos que la imagen se vea bien dentro del sobre */
    .envelope { 
        width: 320px; height: 220px; 
        background: linear-gradient(160deg, #d1d1d1, #7a7a7a); 
        border-radius: 12px; cursor: pointer; 
        display: flex; justify-content: center; align-items: center; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
        transition: all 0.8s ease;
        border: 1px solid rgba(255,255,255,0.2);
    }
    
    /* Efecto de brillo al pasar el mouse */
    .envelope:hover { transform: scale(1.02); filter: brightness(1.1); }
</style>
